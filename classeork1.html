<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        table{
            width: 30%;
        }
        th{
            background-color: blueviolet;
        }
        tr{
            height: 50px;
        }
        td{
            text-align: center;
            background-color: aqua;
            color: blueviolet;
        }
    </style>
</head>
<body>
    <center>
        <table border="1">
            <tr>
      <th colspan="6" class="table-title">CSS3 Browser Support (latest browser versions)</th>
    </tr>
    <tr>
      <th>CSS Property</th>
      <th>Internet Explorer</th>
      <th>FireFox</th>
      <th>Chrome</th>
      <th>Safari</th>
      <th>Opera</th>
    </tr>
  </thead>
  <tbody>
    <tr>
      <td class="property-name">Border Radius</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
    </tr>
    <tr>
      <td class="property-name">Box Shadow</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
      <td>YES</td>
    </tr>
    <tr>
      <td class="property-name">CSS Animations</td>
      <td>NO</td>
      <td>NO</td>
      <td>YES</td>
      <td>YES</td>
      <td>NO</td>
    </tr>
        </table>
    </center>
    
</body>
</html>
